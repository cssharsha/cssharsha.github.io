[taxonomies]
  category = "categories"
  tag = "tags"

# Math: protect $...$ / $$...$$ from Goldmark so MathJax (see
# layouts/partials/extend_head.html) renders them. Needs Hugo >= 0.122.
[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$'], ['\[', '\]']]
          inline = [['$', '$'], ['\(', '\)']]
    [markup.goldmark.renderer]
      unsafe = true